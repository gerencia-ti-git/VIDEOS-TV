<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sinalização Digital - TV Corporativa</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        #player-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        /* ===================================================
           CSS CORRIGIDO PARA MODO VERTICAL (TV EM PÉ)
        =================================================== */
        
        /* Centraliza perfeitamente o container antes de girar */
        .modo-vertical #player-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vh;  /* Inverte largura pela altura da TV */
            height: 100vw; /* Inverte altura pela largura da TV */
            transform: translate(-50%, -50%) rotate(90deg);
            transform-origin: center center;
        }

        /* OPÇÃO: COVER (Preenche 100% da TV em pé, esticando/cortando as bordas) */
        .modo-vertical.modo-cover #player {
            width: 177.78vh !important; /* Proporção matemática 16:9 invertida */
            height: 100vh !important;
            max-width: none !important;
        }

        /* OPÇÃO: CONTAIN (Mostra o vídeo horizontal completo sem cortes, gerando barras) */
        .modo-vertical.modo-contain #player {
            width: 100% !important;
            height: 100% !important;
        }

        #msg {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 12px;
            z-index: 9999;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="player-container">
        <div id="msg">Autenticando e carregando dados do painel...</div>
        <div id="player"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const BASE_URL = "https://agpapi-serverless-657773645743.us-central1.run.app";
        const LOGIN_PATH = `${BASE_URL}/login`;
        const VIDEOS_PATH = `${BASE_URL}/AGPDEV/videos_painel`;

        // Captura das variáveis da URL
        const urlParams = new URLSearchParams(window.location.search);
        const tipoPainel = urlParams.get('tipo') || ''; 
        const ehVertical = urlParams.get('vertical') === 'true';
        const modo = urlParams.get('modo') || 'contain'; // Padrão 'contain' se não enviado

        // Aplica as classes corretas no body para ativar o CSS correspondente
        if (ehVertical) {
            document.body.classList.add('modo-vertical');
            if (modo === 'cover') {
                document.body.classList.add('modo-cover');
            } else {
                document.body.classList.add('modo-contain');
            }
        }

        let playlist = [];
        let indice = 0;
        let player;
        const msg = document.getElementById('msg');

        function extrairVideoId(url) {
            if (!url) return '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        async function carregarVideosDaAPI() {
            try {
                if (!tipoPainel) {
                    msg.innerHTML = "Erro: Defina o parâmetro ?tipo=NOME na URL da TV.";
                    return;
                }

                msg.innerHTML = `Conectando ao painel: ${tipoPainel.toUpperCase()}...`;
                
                const loginRes = await axios.post(LOGIN_PATH, { 
                    usuario: "Triade", 
                    senha: "Agp_#2026!Db_v7Z9@Mtx" 
                });

                const token = loginRes.data.token;
                const config = { headers: { 'Authorization': `Bearer ${token}` } };

                const response = await axios.get(VIDEOS_PATH, config);
                const dadosVideos = Array.isArray(response.data) ? response.data : (response.data.dados || []);

                const videosFiltrados = dadosVideos
                    .filter(video => video.tipo && video.tipo.trim().toUpperCase() === tipoPainel.trim().toUpperCase())
                    .sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

                playlist = videosFiltrados.map(video => extrairVideoId(video.url));

                if (playlist.length === 0) {
                    msg.innerHTML = `Nenhum vídeo encontrado para o tipo: "${tipoPainel.toUpperCase()}"`;
                    return;
                }

                inicializarPlayerYouTube();

            } catch (error) {
                console.error("Erro na integração:", error);
                msg.innerHTML = "Erro ao conectar com o banco de dados da API.";
            }
        }

        function inicializarPlayerYouTube() {
            if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
                setTimeout(inicializarPlayerYouTube, 500);
                return;
            }

            player = new YT.Player('player', {
                videoId: playlist[indice],
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    modestbranding: 1,
                    rel: 0,
                    fs: 0,
                    iv_load_policy: 3,
                    mute: 1
                },
                events: {
                    'onReady': iniciarVideo,
                    'onStateChange': trocarVideo
                }
            });
        }

        function iniciarVideo(event) {
            event.target.playVideo();
            atualizarMsg();
        }

        function trocarVideo(event) {
            if (event.data === 0) {
                indice++;
                if (indice >= playlist.length) {
                    indice = 0;
                }
                atualizarMsg();
                player.loadVideoById(playlist[indice]);
            }
        }

        function atualizarMsg() {
            msg.innerHTML = `Painel: ${tipoPainel.toUpperCase()} | Vídeo ${indice + 1} de ${playlist.length}`;
        }

        carregarVideosDaAPI();
    </script>

</body>
</html>
